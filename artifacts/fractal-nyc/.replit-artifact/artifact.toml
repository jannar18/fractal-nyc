kind = "web"
previewPath = "/"
title = "Fractal NYC"
version = "1.0.0"
id = "artifacts/fractal-nyc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21447
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fractal-nyc run dev"

[services.env]
PORT = "21447"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fractal-nyc", "run", "build"]
publicDir = "artifacts/fractal-nyc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
